name: Docker Agent

on:
  workflow_call:

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Image
        run: |
          docker build \
            -t simplemvcapp:${{ github.sha }} .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: simplemvcapp:${{ github.sha }}
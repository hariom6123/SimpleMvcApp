name: Build Agent

on:
  workflow_call:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            src/**/bin/Release
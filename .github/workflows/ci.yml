name: Enterprise CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**

jobs:

  build:
    uses: ./.github/workflows/build-agent.yml

  test:
    needs: build
    uses: ./.github/workflows/test-agent.yml

  security:
    needs: test
    uses: ./.github/workflows/security-agent.yml

  docker:
    needs: security
    uses: ./.github/workflows/docker-agent.yml

  release:
    needs: docker
    uses: ./.github/workflows/release-agent.yml
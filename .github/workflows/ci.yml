name: Simple MVC CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SimpleMvcApp.sln

      - name: Build
        run: dotnet build SimpleMvcApp.sln --configuration Release --no-restore

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SimpleMvcApp.sln

      - name: Test
        run: dotnet test SimpleMvcApp.sln --configuration Release

  fs-scan:
    name: Filesystem Security Scan
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL

  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: fs-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Build
        run: docker build -t simplemvcapp:${{ github.sha }} .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: simplemvcapp:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  publish:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish src/SimpleMvcApp.Web/SimpleMvcApp.Web.csproj \
            --configuration Release \
            --output ./publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplemvcapp-publish
          path: ./publish
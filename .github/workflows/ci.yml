- name: Build Docker image
      run: |
        docker build -t simplemvcapp:latest .
- name: Test Docker image
      run: docker run --rm simplemvcapp:latest dotnet test ./tests/SimpleMvcApp.Tests/SimpleMvcApp.Tests.csproj
- name: Trivy Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: simplemvcapp:latest
        severity: HIGH,CRITICAL
        exit-code: 1
        format: table

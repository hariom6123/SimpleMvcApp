name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore
        run: dotnet restore SimpleMvcApp.sln

      - name: Build
        run: dotnet build SimpleMvcApp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/SimpleMvcApp.Tests/SimpleMvcApp.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: tests/**/*.trx

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          path: .
          exit-code: 1
          severity: HIGH,CRITICAL
          format: table

      - name: Publish Application
        run: dotnet publish src/SimpleMvcApp.Web/SimpleMvcApp.Web.csproj -c Release -o ./publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleMvcApp
          path: ./publish
